# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: this workflow only builds and tests, so read-only access is
# all it needs. Declared explicitly so it keeps working once the repository
# default workflow token is set to read-only.
permissions:
  contents: read

# One build per ref: superseded PR pushes are cancelled; pushes to main all run.
concurrency:
  group: maven-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '25'
          cache: 'maven'
          distribution: 'temurin'

      - name: Build with Maven
        # use the wrapper so CI builds with the same pinned, checksum-verified Maven as local builds
        run: ./mvnw -B -ntp verify