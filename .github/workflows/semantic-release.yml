name: Semantic Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      published: ${{ steps.semantic.outputs.new_release_published }}
      
    steps:
      # Runs before checkout: actions/checkout fails with a cryptic
      # "Input required and not supplied: token" if RELEASE_PAT is empty, so
      # guard here to surface a clear, actionable error instead.
      - name: Verify release token
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::error::RELEASE_PAT secret is not set. semantic-release needs a PAT that is" \
                 "allowed to push to the protected main branch (see the workflow comments)."
            exit 1
          fi
          echo "RELEASE_PAT is configured."

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so the release commit can be pushed back to the
          # protected main branch; persisted credentials are reused by the git push.
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          # settings.xml references ${env.MAVEN_USERNAME}/${env.MAVEN_TOKEN}. Keep
          # these distinct from GITHUB_TOKEN: the Run semantic-release step overrides
          # GITHUB_TOKEN with RELEASE_PAT (Contents-only, no packages:write), so the
          # Maven deploy must auth via the built-in token through MAVEN_TOKEN instead.
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Verify Maven settings
        run: |
          echo "Maven settings.xml content:"
          cat ~/.m2/settings.xml || echo "No settings.xml found"
          echo "GitHub actor: ${{ github.actor }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          
      - name: Install semantic-release
        run: |
          npm install -g semantic-release
          npm install -g @semantic-release/changelog
          npm install -g @semantic-release/git
          npm install -g @semantic-release/github
          npm install -g @semantic-release/exec
          npm install -g conventional-changelog-conventionalcommits

      - name: Create semantic-release config
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main"],
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "preset": "conventionalcommits",
                  "releaseRules": [
                    {"type": "feat", "release": "minor"},
                    {"type": "fix", "release": "patch"},
                    {"type": "perf", "release": "patch"},
                    {"type": "docs", "release": false},
                    {"type": "style", "release": false},
                    {"type": "refactor", "release": "patch"},
                    {"type": "test", "release": false},
                    {"type": "build", "release": "patch"},
                    {"type": "ci", "release": false},
                    {"type": "chore", "release": false},
                    {"type": "revert", "release": "patch"},
                    {"scope": "no-release", "release": false},
                    {"breaking": true, "release": "major"}
                  ],
                  "parserOpts": {
                    "noteKeywords": ["BREAKING CHANGE", "BREAKING CHANGES"]
                  }
                }
              ],
              [
                "@semantic-release/release-notes-generator",
                {
                  "preset": "conventionalcommits",
                  "presetConfig": {
                    "types": [
                      {"type": "feat", "section": "✨ Features"},
                      {"type": "fix", "section": "🐛 Bug Fixes"},
                      {"type": "perf", "section": "⚡ Performance Improvements"},
                      {"type": "refactor", "section": "♻️ Code Refactoring"},
                      {"type": "build", "section": "🔧 Build System"},
                      {"type": "revert", "section": "⏪ Reverts"}
                    ]
                  }
                }
              ],
              "@semantic-release/changelog",
              [
                "@semantic-release/exec",
                {
                  "prepareCmd": "mvn versions:set -DnewVersion=${nextRelease.version} -DgenerateBackupPoms=false -DprocessAllModules=true",
                  "publishCmd": "mvn clean deploy -DskipTests=true"
                }
              ],
              [
                "@semantic-release/git",
                {
                  "assets": ["pom.xml", "**/pom.xml", "CHANGELOG.md"],
                  "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
                }
              ],
              "@semantic-release/github"
            ]
          }
          EOF

      - name: Run semantic-release
        id: semantic
        env:
          # PAT drives both the @semantic-release/git push to main and the
          # @semantic-release/github release API calls.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          # Maven deploy to GitHub Packages uses the built-in token (packages:write).
          # settings.xml reads these via ${env.MAVEN_USERNAME}/${env.MAVEN_TOKEN}.
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release
        
      - name: Log release info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "🎉 New release published!"
          echo "Version: ${{ steps.semantic.outputs.new_release_version }}"
          echo "Release notes: ${{ steps.semantic.outputs.new_release_notes }}"